# Builds and publishes the brain app image (UI + brain-manager, from the root
# Dockerfile) to GHCR. brain online pulls the built neuron VIEWER out of this
# image at its own build time (COPY --from=ghcr.io/flujo-app/brain:latest
# /app/ui), so the viewer it serves is always the one shipped by this repo —
# no more hand-copied dist. Runs on version tags, on main when the UI/manager
# sources change, and on demand.
name: Publish brain image

on:
  push:
    tags: ['v*']
    branches: [main]
    paths:
      - 'src/**'
      - 'index.html'
      - 'lobby.html'
      - 'vite.config.ts'
      - 'package.json'
      - 'package-lock.json'
      - 'Dockerfile'
      - 'manager/**'
  workflow_dispatch:

jobs:
  image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          pull: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/brain:latest
            ghcr.io/${{ github.repository_owner }}/brain:${{ github.sha }}
